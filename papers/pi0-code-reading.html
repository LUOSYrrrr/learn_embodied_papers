  <script src="../assets/js/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js"></script>
  <!-- 两套高亮主题，随站点 light/dark 切换启用 -->
  <link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <link id="hljs-dark"  rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" disabled>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    /* ─── Markdown 渲染区样式，尽量贴本站深色主题 ─── */
    .md-render { font-size: 15px; line-height: 1.85; color: var(--text2); }
    .md-render h1 { font-family: var(--font-serif); font-size: 28px; font-weight: 700; color: var(--text); margin: 40px 0 18px; }
    .md-render h2 {
      font-family: var(--font-serif); font-size: 22px; font-weight: 700; color: var(--text);
      margin: 44px 0 14px; padding-top: 20px; border-top: 1px solid var(--border);
    }
    .md-render h3 { font-family: var(--font-serif); font-size: 17px; font-weight: 600; color: var(--text); margin: 28px 0 10px; }
    .md-render h4 { font-size: 15px; font-weight: 600; color: var(--text); margin: 20px 0 8px; }
    .md-render p { margin: 10px 0; }
    .md-render strong { color: var(--text); font-weight: 600; }
    .md-render em { color: var(--text); font-style: italic; }

    .md-render a { color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent); }
    .md-render a:hover { opacity: 0.8; }

    .md-render ul, .md-render ol { margin: 10px 0 10px 22px; padding: 0; }
    .md-render li { margin: 6px 0; }
    .md-render li > input[type="checkbox"] { margin-right: 8px; }

    /* 内联 code */
    .md-render p code, .md-render li code, .md-render td code, .md-render h1 code,
    .md-render h2 code, .md-render h3 code, .md-render h4 code {
      font-family: var(--font-mono); font-size: 0.88em;
      background: var(--bg3); color: var(--accent);
      padding: 2px 6px; border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* 代码块（pre > code）—— 保留换行 */
    .md-render pre {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px; margin: 16px 0;
      overflow-x: auto;
    }
    .md-render pre code {
      font-family: var(--font-mono); font-size: 13px; line-height: 1.65;
      background: none; border: none; padding: 0; color: var(--text);
      white-space: pre; display: block;
    }
    /* highlight.js 覆盖背景，让站点 --bg3 透出来 */
    .md-render pre code.hljs { background: transparent; padding: 0; }

    /* 表格 */
    .md-render table {
      width: 100%; margin: 16px 0; border-collapse: collapse;
      font-size: 13px;
    }
    .md-render th, .md-render td {
      border: 1px solid var(--border);
      padding: 10px 14px; text-align: left; vertical-align: top;
    }
    .md-render th { background: var(--bg2); color: var(--text); font-weight: 600; }
    .md-render tbody tr:nth-child(even) { background: var(--bg2); }

    /* blockquote */
    .md-render blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px; margin: 14px 0;
      background: var(--bg2); color: var(--text2);
    }
    .md-render blockquote p { margin: 4px 0; }

    /* hr */
    .md-render hr { border: none; border-top: 1px dashed var(--border); margin: 32px 0; }

    /* loading/error */
    .md-loading { padding: 40px; text-align: center; color: var(--text3); font-family: var(--font-mono); font-size: 13px; }
    .md-error {
      padding: 20px; margin: 20px 0; border: 1px solid var(--accent3);
      border-radius: var(--radius); background: var(--bg2);
      color: var(--accent3); font-family: var(--font-mono); font-size: 13px;
    }

    /* 让第一个 h1 不要有顶部分隔线（因为上面已经有 paper-header） */
    .md-render > h1:first-child, .md-render > h2:first-child { border-top: none; padding-top: 0; margin-top: 0; }
  </style>
</head>

          &nbsp;·&nbsp;

  <script>
    // 高亮主题跟随站点 data-theme 切换
    function syncHljsTheme() {
      var dark = document.documentElement.getAttribute('data-theme') === 'dark';
      var l = document.getElementById('hljs-light');
      var d = document.getElementById('hljs-dark');
      if (l) l.disabled = dark;
      if (d) d.disabled = !dark;
    }
    syncHljsTheme();
    new MutationObserver(syncHljsTheme).observe(
      document.documentElement, { attributes: true, attributeFilter: ['data-theme'] }
    );

    // marked 配置：代码高亮用 highlight.js
    marked.setOptions({
      gfm: true,
      breaks: false,
      headerIds: true,
      mangle: false,
    });

    // 自定义 renderer：给标题加 anchor id（从文字 slugify）
    const renderer = new marked.Renderer();
    const slug = (t) => String(t).toLowerCase()
      .replace(/<[^>]*>/g, '')
      .replace(/[^\w\u4e00-\u9fa5\s-]/g, '')
      .trim().replace(/\s+/g, '-');
    renderer.heading = (text, level) => {
      const id = slug(text);
      return `<h${level} id="${id}">${text}</h${level}>`;
    };

    // 把 MD 里 ](src/openpi/... 这类代码仓内部链接改写成 GitHub 绝对链接
    const REPO_BASE = 'https://github.com/Physical-Intelligence/openpi/blob/main/';
    renderer.link = (href, title, text) => {
      let h = href;
      if (/^src\//.test(h)) h = REPO_BASE + h;
      const titleAttr = title ? ` title="${title}"` : '';
      const extAttr = /^https?:/.test(h) ? ' target="_blank" rel="noopener"' : '';
      return `<a href="${h}"${titleAttr}${extAttr}>${text}</a>`;
    };

    marked.use({ renderer });

    fetch('../notes/pi0-code-reading.md')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(md => {
        const container = document.getElementById('md-content');
        container.innerHTML = marked.parse(md);
        // 语法高亮
        container.querySelectorAll('pre code').forEach(el => {
          try { hljs.highlightElement(el); } catch (e) {}
        });
      })
      .catch(err => {
        document.getElementById('md-content').innerHTML =
          '<div class="md-error">加载 Markdown 失败: ' + err.message +
          '<br><small>确保用 HTTP server 访问（如 <code>python -m http.server</code>），file:// 协议会被浏览器拦截。</small></div>';
      });
  </script>
